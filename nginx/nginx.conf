user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Basic settings ────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;
    client_max_body_size 10M;

    # ── Gzip compression ──────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────
    # General API: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
    # Auth: 5 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
    # Static/health: 100 req/min per IP
    limit_req_zone $binary_remote_addr zone=static:10m rate=100r/m;
    # Webhooks: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=30r/m;

    limit_req_status 429;

    # ── Access log with timing ────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Upstream to app:8000 ──────────────────────────────────
    upstream nexusops {
        server nexusops:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # TLS — replace with real certs (Let's Encrypt, ACM, etc.)
        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                              always;
        add_header X-Content-Type-Options    "nosniff"                                 always;
        add_header X-XSS-Protection          "1; mode=block"                           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"         always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss:;"
            always;

        # ── Health & metrics (no rate limit) ──────────────────
        location ~ ^/(health|metrics) {
            limit_req zone=static burst=20 nodelay;
            proxy_pass         http://nexusops;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket ─────────────────────────────────────────
        location /ws {
            proxy_pass         http://nexusops;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Auth (strict rate limit) ──────────────────────────
        location ~ ^/auth/(token|login) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass         http://nexusops;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Webhooks ──────────────────────────────────────────
        location /webhooks/ {
            limit_req zone=webhooks burst=10 nodelay;
            proxy_pass         http://nexusops;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── All other API routes ──────────────────────────────
        location / {
            limit_req zone=api burst=15 nodelay;
            proxy_pass         http://nexusops;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
            proxy_send_timeout 30s;
        }

        # ── Block sensitive paths ─────────────────────────────
        location ~ /\.env    { deny all; return 404; }
        location ~ /\.git    { deny all; return 404; }
        location ~ /\.github { deny all; return 404; }
    }
}
